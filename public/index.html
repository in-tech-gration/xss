<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cross-Site Scripting (XSS)</title>
</head>

<body>

  <!-- A simple form that when submitted will navigate back to the same page -->
  <form action="" method="GET">
    <!-- Adds `?q=VALUE` to the URL when the form is submitted -->
    <input type="text" name="q">
    <input type="submit" value="Search">
  </form>

  <!-- The results of the search are inserted here -->
  <div id="results"></div>

  <script>
    function search(q, callback) {

      // Fake results. We don't actually searching anything.
      const results = [
        'Result #1',
        'Result #2',
        'Result #3'
      ];

      callback(null, results);
    }

    // ❌ Unsafe
    function showQueryAndResults(q, results) {

      const resultsEl = document.querySelector('#results');
      let html = `
        <p>Your search query:</p>
        <pre>${q}</pre>
        <ul>
      `;

      for (const result of results) {
        html += `<li>${result}</li>`;
      }
      html += '</ul>';
      resultsEl.innerHTML = html;
    }

    // ✅ Safer
    function safeShowQueryAndResults(q, results) {

      const resultsEl = document.querySelector('#results');
      let html = `
        <p>Your search query:</p>
        <pre></pre>
        <ul>
      `;

      for (const result of results) {
        html += `<li>${result}</li>`;
      }
      html += '</ul>';
      // We're quite safe here, as we are just injection our own data as HTML:
      resultsEl.innerHTML = html;

      const queryTextEl = document.querySelector('#results pre');
      // User input is inserted as plain text not HTML:
      queryTextEl.textContent = q;

    }

    function getQueryParameter(name) {

      const pairs = window.location.search.substring(1).split('&');

      for (const pair of pairs) {

        const _pair = pair.split('=');

        if (decodeURIComponent(_pair[0]) === name) {
          return decodeURIComponent(_pair[1]);
        }

      }

      return false;
    }

    document.addEventListener('DOMContentLoaded', function () {

      /*
        Get the search query from the URL. For example:
        http://xss-example-page.nowhere/?q=Searching+for+things
      */
      const q = getQueryParameter('q');

      if (q) {

        search(q, function (error, results) {
          showQueryAndResults(q, results);
        });
      }
    });

  </script>
</body>

</html>
